<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pelaporan IT & ATK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style> 
        body { background-color: #f4f7f6; padding-top: 50px; padding-bottom: 50px; } 
        .card { border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); } 
        .kartu-tiket { background-color: #ffffff; border: 2px dashed #0d6efd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="text-center mb-4 text-primary">Portal Pelaporan Kerusakan Lab Komputer</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h4 class="mb-3" id="judulForm">Buat Laporan Baru</h4>
                
                <form id="formPelaporan">
                    <input type="hidden" name="id_tiket" id="id_tiket">

                    <div class="mb-3">
                        <label class="form-label">Nama Pelapor</label>
                        <input type="text" class="form-control" name="nama" id="inputNama" required placeholder="Masukkan nama Anda">
                    </div>

                    <div class="mb-3">
                         <label class="form-label">Ruang LAB</label>
                         <select class="form-select" name="ruang_lab" id="ruang_lab" required>
                          <option value="" selected disabled>Memuat pilihan ruangan...</option>
                       </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nomor PC / Aset</label>
                        <input type="text" class="form-control" name="no_pc" id="inputNoPC" required placeholder="Contoh: PC-05 atau 05">
                    </div>

                    <div class="mb-3">
                          <label class="form-label">Kategori Kerusakan</label>
                          <select class="form-select" name="kategori" id="kategori" required>
                          <option value="" selected disabled>Memuat pilihan kategori...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tingkat Prioritas</label>
                        <select class="form-select" name="prioritas" id="prioritas" required>
                            <option value="" selected disabled>Memuat pilihan prioritas...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Deskripsi Kendala</label>
                        <textarea class="form-control" name="deskripsi" id="inputDeskripsi" rows="3" required placeholder="Contoh: PC tidak bisa menyala dan berbunyi beep..."></textarea>
                    </div>
                    
                    <button type="submit" id="btnSubmit" class="btn btn-primary w-100 fw-bold">Kirim Laporan</button>
                </form>

                <div id="notifikasi" class="mt-3 d-none" role="alert"></div>
            </div>
        </div>
    </div>
</div>

<script>
    if (!localStorage.getItem('draft_id_tiket')) {
        localStorage.setItem('draft_id_tiket', "TKT-" + Math.floor(Math.random() * 1000000));
    }
    document.getElementById('id_tiket').value = localStorage.getItem('draft_id_tiket');

    const form = document.getElementById('formPelaporan');
    const btnSubmit = document.getElementById('btnSubmit');
    const notifikasi = document.getElementById('notifikasi');
    const judulForm = document.getElementById('judulForm');
    
    // URL Web App Anda
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxRKGaisslBvEKLYMcBZpnk5XkXNuMIQj8LM0dHKCszI_lqgSIv7xaa-x1I4YuDKxIB/exec';
    
    function simpanDraft() {
        const draft = {
            nama: document.getElementById('inputNama').value,
            ruang_lab: document.getElementById('ruang_lab').value,
            no_pc: document.getElementById('inputNoPC').value,
            kategori: document.getElementById('kategori').value,
            prioritas: document.getElementById('prioritas').value,
            deskripsi: document.getElementById('inputDeskripsi').value
        };
        localStorage.setItem('draft_laporan', JSON.stringify(draft));
    }

    form.addEventListener('input', simpanDraft);
    form.addEventListener('change', simpanDraft);

    document.addEventListener("DOMContentLoaded", function() {
        fetch(scriptURL) 
            .then(response => response.json())
            .then(data => {
                if(data.error) return console.error("Error:", data.error);
                
                function isiDropdown(idDropdown, arrayData, teksDefault) {
                    const dropdown = document.getElementById(idDropdown);
                    dropdown.innerHTML = `<option value="" selected disabled>${teksDefault}</option>`;
                    arrayData.forEach(item => {
                        let option = document.createElement("option");
                        option.value = item; option.textContent = item;
                        dropdown.appendChild(option);
                    });
                }

                if(data.ruangan) isiDropdown('ruang_lab', data.ruangan, 'Pilih Ruangan...');
                if(data.kategori) isiDropdown('kategori', data.kategori, 'Pilih Kategori...');
                if(data.prioritas) isiDropdown('prioritas', data.prioritas, 'Pilih Prioritas...');

                const savedDraft = localStorage.getItem('draft_laporan');
                if (savedDraft) {
                    const draft = JSON.parse(savedDraft);
                    if (draft.nama) document.getElementById('inputNama').value = draft.nama;
                    if (draft.no_pc) document.getElementById('inputNoPC').value = draft.no_pc;
                    if (draft.deskripsi) document.getElementById('inputDeskripsi').value = draft.deskripsi;
                    
                    setTimeout(() => {
                        if (draft.ruang_lab) document.getElementById('ruang_lab').value = draft.ruang_lab;
                        if (draft.kategori) document.getElementById('kategori').value = draft.kategori;
                        if (draft.prioritas) document.getElementById('prioritas').value = draft.prioritas;
                    }, 100); 
                }
            })
            .catch(error => console.error('Gagal mengambil data:', error));
    });

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        btnSubmit.innerHTML = 'Mengirim...';
        btnSubmit.disabled = true;
        notifikasi.classList.add('d-none');

        const tiketTerkirim = document.getElementById('id_tiket').value;
        const namaUser = document.getElementById('inputNama').value;
        const ruangUser = document.getElementById('ruang_lab').value;
        const pcUser = document.getElementById('inputNoPC').value;
        const deskripsiUser = document.getElementById('inputDeskripsi').value;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                notifikasi.classList.remove('d-none');
                
                // Membuat Link Scan untuk Teknisi (diubah ke dalam bentuk QR Code)
                const linkScanTeknisi = encodeURIComponent(scriptURL + "?action=scan&tiket=" + tiketTerkirim);
                const qrCodeImg = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${linkScanTeknisi}`;
                
                notifikasi.innerHTML = `
                    <div class="text-center">
                        <h4 class="mb-3 text-success">✅ Laporan Berhasil Terkirim!</h4>
                        
                        <div class="kartu-tiket text-start shadow-sm">
                            <h5 class="text-center mb-3 fw-bold text-primary">🎫 E-Tiket Perbaikan IT</h5>
                            <table class="table table-sm table-borderless">
                                <tr><td width="35%"><strong>No Tiket</strong></td><td>: <span class="badge bg-dark">${tiketTerkirim}</span></td></tr>
                                <tr><td><strong>Pelapor</strong></td><td>: ${namaUser}</td></tr>
                                <tr><td><strong>Lokasi</strong></td><td>: ${ruangUser} (PC: ${pcUser})</td></tr>
                                <tr><td><strong>Kendala</strong></td><td>: ${deskripsiUser}</td></tr>
                            </table>
                            <div class="text-center mt-3 pt-3 border-top">
                                <img src="${qrCodeImg}" alt="QR Code Teknisi" class="border p-2 bg-light rounded" style="width: 150px;">
                                <p class="text-muted mt-2" style="font-size: 12px;"><strong>Tunjukkan QR Code ini ke Teknisi</strong>
                            </div>
                        </div>

                        <p class="mt-3">Mohon <i>screenshot</i> halaman ini sebagai bukti.</p>
                        <button onclick="window.location.reload()" class="btn btn-outline-primary w-100 fw-bold mt-2">Buka Laporan Baru</button>
                    </div>
                `;
                
                form.style.display = 'none';
                judulForm.style.display = 'none';
                
                localStorage.removeItem('draft_laporan');
                const newTiket = "TKT-" + Math.floor(Math.random() * 1000000);
                localStorage.setItem('draft_id_tiket', newTiket);
            })
            .catch(error => {
                notifikasi.classList.remove('d-none');
                notifikasi.innerHTML = '<div class="alert alert-danger">❌ Gagal mengirim laporan. Pastikan internet Anda lancar.</div>';
                btnSubmit.innerHTML = 'Kirim Laporan';
                btnSubmit.disabled = false;
            });
    });
</script>
</body>
</html>
